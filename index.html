<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DM Celular</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      height: 100vh;
      background: linear-gradient(135deg, #0f0f0f, #1c1c1c);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }

    .container {
      text-align: center;
      padding: 30px;
      border-radius: 15px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      box-shadow: 0 0 30px rgba(0,0,0,0.5);
      max-width: 400px;
      width: 90%;
    }

    .logo {
      font-size: 28px;
      font-weight: bold;
      color: #f1c40f;
      margin-bottom: 10px;
    }

    h1 {
      font-size: 24px;
      margin-bottom: 10px;
    }

    p {
      opacity: 0.7;
      margin-bottom: 20px;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 12px;
      background: #25D366;
      color: white;
      text-decoration: none;
      border-radius: 10px;
      font-weight: bold;
      transition: 0.3s;
    }

    .btn:hover {
      background: #1ebe5d;
    }

    .footer {
      margin-top: 20px;
      font-size: 12px;
      opacity: 0.5;
    }
  </style>
</head>

<body>

  <div class="container">
    <div class="logo">DM CELULAR</div>

    <h1>🚧 Site em construção</h1>
    <p>Estamos preparando algo incrível pra você!</p>

    <a class="btn" href="https://wa.me/5515996413988?text=Olá,%20vim%20pelo%20site">
      Falar no WhatsApp
    </a>

    <div class="footer">
      Vem pra DM, aqui é qualidade.
    </div>
  </div>

</body>
</html>
