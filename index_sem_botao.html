<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DM Celular</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: linear-gradient(135deg, #f5f5f7, #e0e0e5);
  text-align: center;
  color: #111;
  animation: fadeIn 0.8s ease-in-out;
}

@keyframes fadeIn {
  from {opacity: 0; transform: translateY(20px);}
  to {opacity: 1; transform: translateY(0);}
}

.logo { margin-top: 20px; }
.logo img { width: 110px; }

.container {
  max-width: 900px;
  margin: 20px auto;
  display: flex;
  justify-content: space-around;
  flex-wrap: wrap;
  gap: 20px;
}

.loja {
  background: white;
  border-radius: 20px;
  padding: 20px;
  width: 260px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

.loja h3 { margin-bottom: 10px; }

.horario {
  font-size: 13px;
  color: #555;
  margin-bottom: 10px;
  line-height: 1.4;
}

.btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  background: #f7f7f7;
  border-radius: 12px;
  padding: 10px;
  margin: 8px 0;
  text-decoration: none;
  color: #111;
}

.btn img { width: 22px; }

.banner {
  margin: 10px auto 40px;
  max-width: 500px;
  border-radius: 20px;
  overflow: hidden;
}

.banner video { width: 100%; }

</style>
</head>

<body>

<div class="logo">
  <img src="logo.png">
</div>

<div class="container">

<div class="loja">
  <h3>Cesário Lange</h3>

  <div class="horario">
    Seg-Sex: 09h às 18h<br>
    Sábado: 09h às 13h<br>
    Domingo: Fechado
  </div>

  <a class="btn" href="https://wa.me/5515996413988" target="_blank">
    <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png">WhatsApp
  </a>

  <a class="btn" href="https://www.instagram.com/dm.celular_" target="_blank">
    <img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png">Instagram
  </a>

  <a class="btn" href="https://maps.app.goo.gl/icqM1Dzq8faWX4pJA" target="_blank">
    <img src="https://cdn-icons-png.flaticon.com/512/684/684908.png">Endereço
  </a>
</div>

<div class="loja">
  <h3>Quadra</h3>

  <div class="horario">
    Seg-Sex: 09h às 17:30<br>
    Sábado: 09h às 13h<br>
    Domingo: Fechado
  </div>

  <a class="btn" href="https://wa.me/5515996587912" target="_blank">
    <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png">WhatsApp
  </a>

  <a class="btn" href="https://www.instagram.com/dm_celular_" target="_blank">
    <img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png">Instagram
  </a>

  <a class="btn" href="https://maps.app.goo.gl/phQH4eSown5xv5jq7" target="_blank">
    <img src="https://cdn-icons-png.flaticon.com/512/684/684908.png">Endereço
  </a>
</div>

</div>

<div class="banner">
  <video id="videoBanner" muted loop playsinline>
    <source src="banner.mp4" type="video/mp4">
  </video>
</div>

<script>
const video = document.getElementById('videoBanner');
const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      video.play();
    } else {
      video.pause();
    }
  });
}, { threshold: 0.5 });

observer.observe(video);
</script>

</body>
</html>
